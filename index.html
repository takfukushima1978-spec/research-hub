<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Research Hub</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Noto Sans JP', sans-serif; background: #f5f5f5; color: #333; }

  /* Header */
  .header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: #fff; padding: 24px 20px 16px; text-align: center; position: sticky; top: 0; z-index: 10; }
  .header-top { display: flex; justify-content: space-between; align-items: center; max-width: 680px; margin: 0 auto 12px; }
  .header .label { display: inline-block; background: linear-gradient(90deg, #e94560, #ff6b6b); color: #fff; font-size: 11px; font-weight: 700; padding: 3px 12px; border-radius: 20px; letter-spacing: 1px; }
  .header h1 { font-size: 22px; font-weight: 800; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 2px; }
  .auth-area { display: flex; align-items: center; gap: 8px; }
  .auth-btn { background: rgba(255,255,255,0.15); color: #fff; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 6px 12px; font-size: 12px; font-weight: 600; cursor: pointer; }
  .auth-btn:hover { background: rgba(255,255,255,0.25); }
  .auth-email { font-size: 11px; color: rgba(255,255,255,0.7); max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .add-btn { background: #e94560; color: #fff; border: none; border-radius: 50%; width: 32px; height: 32px; font-size: 20px; font-weight: 700; cursor: pointer; line-height: 32px; text-align: center; }

  /* Filters */
  .filter-section { max-width: 680px; margin: 0 auto; padding: 8px 16px 0; }
  .filter-row { display: flex; gap: 6px; overflow-x: auto; padding: 4px 0; -webkit-overflow-scrolling: touch; }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-label { font-size: 11px; color: #999; font-weight: 600; padding: 4px 0 2px; }
  .fbtn { background: #fff; border: 1.5px solid #ddd; border-radius: 16px; padding: 5px 12px; font-size: 12px; font-weight: 600; color: #666; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .fbtn.active { background: #e94560; color: #fff; border-color: #e94560; }
  .fbtn .icon { margin-right: 2px; }
  .tag-l2-row { display: none; }
  .tag-l2-row.show { display: flex; }

  /* Search */
  .search-bar { max-width: 680px; margin: 0 auto; padding: 10px 16px 0; }
  .search-bar input { width: 100%; padding: 9px 14px; border: 1.5px solid #ddd; border-radius: 10px; font-size: 14px; outline: none; }
  .search-bar input:focus { border-color: #e94560; }
  .count { max-width: 680px; margin: 0 auto; padding: 6px 20px 0; font-size: 12px; color: #999; }

  /* Cards */
  .list { max-width: 680px; margin: 0 auto; padding: 4px 0 80px; }
  .card { background: #fff; margin: 8px 16px; padding: 16px 18px; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); cursor: pointer; position: relative; transition: opacity 0.2s; }
  .card.read { opacity: 0.55; }
  .card.clipped { border-left: 4px solid #e94560; }
  .card:active { background: #f9f9f9; }
  .card .meta { font-size: 11px; color: #e94560; font-weight: 700; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
  .card .meta-left { display: flex; align-items: center; gap: 6px; }
  .card .title { font-size: 16px; font-weight: 800; color: #1a1a2e; line-height: 1.5; margin-bottom: 4px; }
  .card .summary { font-size: 13px; color: #888; line-height: 1.6; }
  .card .tags-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .tag-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 10px; color: #fff; }
  .source-badge { font-size: 10px; padding: 2px 6px; border-radius: 8px; background: #f0f0f0; color: #888; }
  .flag-btns { display: flex; gap: 4px; position: absolute; top: 14px; right: 14px; }
  .flag-btn { background: none; border: 1px solid #e0e0e0; border-radius: 6px; padding: 3px 6px; font-size: 14px; cursor: pointer; line-height: 1; }
  .flag-btn.on { border-color: #e94560; background: #fff0f3; }
  .flag-btn:active { transform: scale(0.9); }

  /* Article view */
  .article-view { display: none; }
  .article-view.show { display: block; }
  .list-view.hide { display: none; }
  .back-btn { position: fixed; top: 10px; left: 10px; z-index: 20; background: rgba(0,0,0,0.6); color: #fff; border: none; border-radius: 20px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .ext-link { position: fixed; top: 10px; right: 10px; z-index: 20; background: #e94560; color: #fff; border: none; border-radius: 20px; padding: 8px 14px; font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; }

  /* Article content styles */
  .article-content { line-height: 1.85; font-size: 17px; }
  .article-content .header { position: relative; }
  .article-content .header h1 { font-size: 24px; }
  .article-content .card { cursor: default; margin: 16px auto; max-width: 680px; }
  .article-content .card h2 { font-size: 19px; font-weight: 800; color: #1a1a2e; margin-bottom: 12px; line-height: 1.5; }
  .article-content .card p { font-size: 16px; color: #444; margin-bottom: 10px; line-height: 1.85; }
  .article-content .card .highlight { background: #fff8f0; border-left: 4px solid #e94560; padding: 10px 14px; margin: 14px 0; border-radius: 0 8px 8px 0; font-size: 15px; color: #555; }
  .article-content .card .num { display: inline-block; background: linear-gradient(135deg, #e94560, #ff6b6b); color: #fff; font-size: 11px; font-weight: 700; width: 26px; height: 26px; line-height: 26px; text-align: center; border-radius: 50%; margin-bottom: 10px; }
  .article-content .card .source-link { margin-top: 12px; padding-top: 8px; border-top: 1px dashed #e0e0e0; font-size: 13px; }
  .article-content .card .source-link a { color: #e94560; text-decoration: none; }
  .article-content .lead { background: #fff; margin: -16px 16px 16px; padding: 20px 18px; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); font-size: 16px; color: #555; line-height: 1.9; position: relative; max-width: 680px; margin-left: auto; margin-right: auto; }
  .article-content .lead::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #e94560, #ff6b6b); border-radius: 12px 12px 0 0; }
  .article-content .dark-card, .article-content .warn-card, .article-content .impact, .article-content .security-section { background: linear-gradient(135deg, #0f3460, #1a1a2e); color: #fff; margin: 16px auto; padding: 24px 20px; border-radius: 12px; max-width: 680px; }
  .article-content .dark-card h2, .article-content .warn-card h2, .article-content .impact h2, .article-content .security-section h2 { color: #ff6b6b; font-size: 19px; margin-bottom: 12px; }
  .article-content .dark-card p, .article-content .warn-card p, .article-content .impact p, .article-content .security-section p { color: #ccc; font-size: 16px; margin-bottom: 10px; }
  .article-content .warn, .article-content .security-section .warn { background: rgba(233,69,96,0.15); border: 1px solid rgba(233,69,96,0.3); padding: 10px 14px; border-radius: 8px; margin: 12px 0; font-size: 15px; color: #ffaaaa; }
  .article-content .impact .stat { display: inline-block; background: rgba(233,69,96,0.2); border: 1px solid rgba(233,69,96,0.4); padding: 6px 14px; border-radius: 8px; margin: 3px; font-size: 14px; color: #ff6b6b; font-weight: 700; }
  .article-content .closing { background: #fff; margin: 20px auto; padding: 24px 20px; border-radius: 12px; box-shadow: 0 1px 8px rgba(0,0,0,0.06); max-width: 680px; border-top: 3px solid #e94560; }
  .article-content .closing h3 { font-size: 17px; color: #e94560; margin-bottom: 10px; }
  .article-content .closing p { font-size: 15px; color: #666; line-height: 1.85; }
  .article-content .sources { max-width: 680px; margin: 16px auto 40px; padding: 16px 20px; font-size: 13px; color: #888; }
  .article-content .sources a { color: #e94560; text-decoration: none; }
  .article-content .sources ul { list-style: none; padding: 0; }
  .article-content .sources li { margin-bottom: 6px; padding-left: 14px; position: relative; }
  .article-content .sources li::before { content: '\2192'; position: absolute; left: 0; color: #ccc; }
  .article-content .pricing { background: linear-gradient(135deg, #0f3460, #1a1a2e); color: #fff; margin: 16px auto; padding: 24px 20px; border-radius: 12px; max-width: 680px; text-align: center; }
  .article-content .pricing h2 { color: #ff6b6b; }
  .article-content .pricing .price { font-size: 36px; font-weight: 800; color: #fff; }
  .article-content .pricing p { color: #ccc; font-size: 15px; text-align: left; }
  .article-content code { background: #f0f0f0; padding: 2px 6px; border-radius: 4px; font-size: 15px; color: #e94560; }

  /* Modal */
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 100; }
  .modal-overlay.show { display: flex; align-items: flex-end; justify-content: center; }
  .modal { background: #fff; border-radius: 16px 16px 0 0; padding: 24px 20px 40px; width: 100%; max-width: 680px; max-height: 80vh; overflow-y: auto; }
  .modal h3 { font-size: 18px; font-weight: 800; color: #1a1a2e; margin-bottom: 16px; }
  .modal label { display: block; font-size: 13px; font-weight: 600; color: #666; margin-bottom: 4px; margin-top: 12px; }
  .modal input, .modal textarea, .modal select { width: 100%; padding: 10px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; font-family: inherit; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: #e94560; }
  .modal textarea { resize: vertical; min-height: 80px; }
  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .modal-actions button { flex: 1; padding: 12px; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; }
  .btn-cancel { background: #f0f0f0; border: none; color: #666; }
  .btn-submit { background: #e94560; border: none; color: #fff; }

  .loading { text-align: center; padding: 40px; color: #999; font-size: 14px; }

  /* Modal tabs */
  .modal-tabs { display: flex; gap: 0; margin-bottom: 16px; border: 1.5px solid #ddd; border-radius: 10px; overflow: hidden; }
  .modal-tab { flex: 1; padding: 10px 8px; font-size: 13px; font-weight: 700; cursor: pointer; background: #f5f5f5; border: none; color: #999; transition: all 0.15s; }
  .modal-tab.active { background: #e94560; color: #fff; }
  .modal-tab:first-child { border-right: 1.5px solid #ddd; }
  .modal-tab.active + .modal-tab, .modal-tab.active { border-color: #e94560; }
  .modal-fields { display: none; }
  .modal-fields.show { display: block; }
  .char-count { text-align: right; font-size: 12px; color: #aaa; margin-top: 4px; }
  .modal textarea.body-text { min-height: 200px; font-size: 15px; }
  .url-type-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; color: #fff; margin-top: 6px; }

  /* Deep Research */
  .deep-research-fab { display: none; position: fixed; bottom: 80px; right: 16px; z-index: 30; background: #8b5cf6; color: #fff; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(139,92,246,0.4); align-items: center; justify-content: center; }
  .deep-research-fab.show { display: flex; }

  /* Research result cards */
  .research-section { max-width: 680px; margin: 16px auto 40px; padding: 0 16px; }
  .research-section h3 { font-size: 16px; font-weight: 700; color: #8b5cf6; margin-bottom: 12px; }
  .research-card { background: #fff; border-radius: 12px; box-shadow: 0 1px 6px rgba(0,0,0,0.06); border-left: 4px solid #8b5cf6; padding: 16px; margin-bottom: 10px; }
  .research-status-badge { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 12px; color: #fff; }
  .research-status-badge.pending { background: #f59e0b; }
  .research-status-badge.processing { background: #3b82f6; }
  .research-status-badge.completed { background: #10b981; }
  .research-status-badge.failed { background: #ef4444; }
  .research-focus { font-size: 15px; font-weight: 600; color: #1a1a2e; margin: 8px 0 4px; }
  .research-summary { font-size: 14px; color: #555; line-height: 1.7; margin: 6px 0; }
  .research-link { display: inline-block; margin-top: 8px; color: #8b5cf6; font-size: 13px; text-decoration: none; font-weight: 600; }
  .research-notebook-badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; background: #f3f0ff; color: #8b5cf6; font-weight: 600; margin-top: 6px; }
  .research-date { font-size: 11px; color: #aaa; margin-top: 6px; }
  .research-badge { font-size: 14px; margin-left: 4px; }

  /* Toast */
  .toast { display: none; position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 12px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; z-index: 200; white-space: nowrap; }
  .toast.show { display: block; }
</style>
</head>
<body>

<div class="list-view" id="listView">
  <div class="header">
    <div class="header-top">
      <div class="label">AI RESEARCH HUB</div>
      <div class="auth-area" id="authArea"></div>
    </div>
    <h1>Tak's Research Library</h1>
    <p>パーソナルAIリサーチ基盤</p>
  </div>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="キーワードで検索..." oninput="applyFilters()">
  </div>
  <div class="filter-section">
    <div class="filter-label">状態</div>
    <div class="filter-row" id="statusFilters"></div>
    <div class="filter-label">カテゴリ</div>
    <div class="filter-row" id="catFilters"></div>
    <div class="filter-label">タグ</div>
    <div class="filter-row" id="tagL1Filters"></div>
    <div class="filter-row tag-l2-row" id="tagL2Filters"></div>
  </div>
  <div class="count" id="count"></div>
  <div class="list" id="articleList"><div class="loading">読み込み中...</div></div>
</div>

<div class="article-view" id="articleView">
  <button class="back-btn" onclick="showList()">← 戻る</button>
  <a class="ext-link" id="extLink" href="#" target="_blank" style="display:none">原文を開く</a>
  <div class="article-content" id="articleContent"></div>
  <div id="researchResults"></div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>📎 記事を登録</h3>
    <div class="modal-tabs">
      <button class="modal-tab active" id="tabUrl" onclick="switchMode('url')">🔗 URLで登録</button>
      <button class="modal-tab" id="tabText" onclick="switchMode('text')">📝 テキスト貼り付け</button>
    </div>

    <!-- URLモード -->
    <div class="modal-fields show" id="fieldsUrl">
      <label>URL（任意）</label>
      <input type="url" id="addUrl" placeholder="WebページURL / Googleドキュメント / Google DriveのPDF" oninput="updateUrlBadge('addUrl','urlTypeBadge')">
      <div><span class="url-type-badge" id="urlTypeBadge" style="display:none"></span></div>
      <label>タイトル *</label>
      <input type="text" id="addTitle" placeholder="記事のタイトル">
      <label>メモ（任意）</label>
      <textarea id="addBody" placeholder="要点やメモ"></textarea>
    </div>

    <!-- テキスト貼り付けモード -->
    <div class="modal-fields" id="fieldsText">
      <label>タイトル *</label>
      <input type="text" id="addTitleText" placeholder="記事のタイトル">
      <label>記事全文 *</label>
      <textarea id="addBodyText" class="body-text" placeholder="記事の全文をここに貼り付け..." oninput="updateCharCount()"></textarea>
      <div class="char-count" id="charCount">0文字</div>
      <label>ソースURL（任意）</label>
      <input type="url" id="addSourceUrl" placeholder="WebページURL / Googleドキュメント / Google DriveのPDF" oninput="updateUrlBadge('addSourceUrl','sourceUrlTypeBadge')">
      <div><span class="url-type-badge" id="sourceUrlTypeBadge" style="display:none"></span></div>
    </div>

    <!-- 共通: タグ選択 -->
    <label>タグ（大区分）</label>
    <select id="addTagL1" onchange="updateTagL2Select()"><option value="">選択...</option></select>
    <label>タグ（中区分）</label>
    <select id="addTagL2"><option value="">選択...</option></select>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('modalOverlay').classList.remove('show')">キャンセル</button>
      <button class="btn-submit" onclick="submitArticle()">登録</button>
    </div>
  </div>
</div>

<!-- Deep Research FAB -->
<button class="deep-research-fab" id="deepResearchFab" onclick="openDeepResearchModal()">🔬</button>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Deep Research Modal -->
<div class="modal-overlay" id="deepResearchModalOverlay" onclick="closeDeepResearchModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>🔬 この記事について深掘りリクエスト</h3>
    <label>深掘りポイント *</label>
    <textarea id="drFocusPoint" placeholder="例: EYのAI監査の具体的な実装方法を知りたい"></textarea>
    <label>追加の文脈（任意）</label>
    <textarea id="drAdditionalContext" placeholder="追加の質問や知りたい観点"></textarea>
    <label>優先度</label>
    <select id="drPriority">
      <option value="1">高</option>
      <option value="5" selected>中</option>
      <option value="9">低</option>
    </select>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="document.getElementById('deepResearchModalOverlay').classList.remove('show')">キャンセル</button>
      <button class="btn-submit" style="background:#8b5cf6" onclick="submitDeepResearch()">リクエスト送信</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = "https://swgdzytwyvkwvncaqjks.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InN3Z2R6eXR3eXZrd3ZuY2FxamtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njc5NzM2NTAsImV4cCI6MjA4MzU0OTY1MH0.ENvRrnMvvrYECscFNleKI2lBydZ6_aQ621V28bMwcCE";

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  db: { schema: 'research' }
});

let allArticles = [];
let allTags = [];
let articleTagsMap = {};
let currentUser = null;
let filters = { status: 'all', category: null, tagL1: null, tagL2: null };
let deepResearchMap = {};
let currentArticleId = null;

const TAG_COLORS = {
  'accounting': '#3b82f6',
  'ai_tech': '#10b981',
  'tools': '#f59e0b',
  'security_risk': '#ef4444',
  'business': '#8b5cf6'
};

// ===== Auth =====
async function initAuth() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
  }
  sb.auth.onAuthStateChange((event, session) => {
    currentUser = session?.user || null;
    renderAuthArea();
    renderList(getFiltered());
  });
  renderAuthArea();
}

function renderAuthArea() {
  const area = document.getElementById('authArea');
  if (currentUser) {
    area.innerHTML = `
      <button class="add-btn" onclick="openModal()" title="記事を登録">+</button>
      <span class="auth-email">${currentUser.email}</span>
      <button class="auth-btn" onclick="signOut()">ログアウト</button>`;
  } else {
    area.innerHTML = `<button class="auth-btn" onclick="signIn()">Googleログイン</button>`;
  }
}

async function signIn() {
  await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
}

async function signOut() {
  await sb.auth.signOut();
  currentUser = null;
  renderAuthArea();
  renderList(getFiltered());
}

// ===== Data Loading =====
async function loadData() {
  const [artRes, tagRes] = await Promise.all([
    fetch(SUPABASE_URL + "/rest/v1/articles?select=id,slug,title_ja,summary,source_date,is_read,is_clipped,source_type,external_url,categories(name,label_ja)&status=eq.published&order=source_date.desc", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept-Profile": "research" }
    }),
    fetch(SUPABASE_URL + "/rest/v1/tags?select=id,name,label_ja,level,parent_id,icon,sort_order&order=level.asc,sort_order.asc", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept-Profile": "research" }
    })
  ]);
  allArticles = await artRes.json();
  allTags = await tagRes.json();

  // Load article-tag mappings
  const atRes = await fetch(SUPABASE_URL + "/rest/v1/article_tags?select=article_id,tag_id", {
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept-Profile": "research" }
  });
  const atData = await atRes.json();
  articleTagsMap = {};
  atData.forEach(at => {
    if (!articleTagsMap[at.article_id]) articleTagsMap[at.article_id] = [];
    articleTagsMap[at.article_id].push(at.tag_id);
  });

  // 深掘りリクエスト一覧を取得してマッピング
  const drRes = await fetch(SUPABASE_URL + "/rest/v1/deep_research_requests?select=article_id,status&order=created_at.desc", {
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept-Profile": "research" }
  });
  const drData = await drRes.json();
  deepResearchMap = {};
  if (Array.isArray(drData)) {
    drData.forEach(dr => { deepResearchMap[dr.article_id] = true; });
  }

  renderFilters();
  renderList(allArticles);
}

// ===== Filters =====
function renderFilters() {
  // Status
  const statuses = [
    { key: 'all', label: 'すべて' },
    { key: 'unread', label: '未読' },
    { key: 'clipped', label: '📌 クリップ' },
    { key: 'deep', label: '🔬 深掘り' }
  ];
  document.getElementById('statusFilters').innerHTML = statuses.map(s =>
    `<button class="fbtn ${filters.status === s.key ? 'active' : ''}" onclick="setFilter('status','${s.key}',this)">${s.label}</button>`
  ).join('');

  // Categories
  const cats = [...new Set(allArticles.map(a => a.categories?.name).filter(Boolean))];
  const catLabels = {};
  allArticles.forEach(a => { if (a.categories) catLabels[a.categories.name] = a.categories.label_ja; });
  let catHtml = `<button class="fbtn ${!filters.category ? 'active' : ''}" onclick="setFilter('category',null,this)">すべて</button>`;
  cats.forEach(c => {
    catHtml += `<button class="fbtn ${filters.category === c ? 'active' : ''}" onclick="setFilter('category','${c}',this)">${catLabels[c] || c}</button>`;
  });
  document.getElementById('catFilters').innerHTML = catHtml;

  // L1 Tags
  const l1Tags = allTags.filter(t => t.level === 1);
  let l1Html = `<button class="fbtn ${!filters.tagL1 ? 'active' : ''}" onclick="setTagFilter(null)">すべて</button>`;
  l1Tags.forEach(t => {
    l1Html += `<button class="fbtn ${filters.tagL1 === t.id ? 'active' : ''}" onclick="setTagFilter('${t.id}')">${t.icon || ''} ${t.label_ja || t.name}</button>`;
  });
  document.getElementById('tagL1Filters').innerHTML = l1Html;

  // L1 tag select for modal
  const sel = document.getElementById('addTagL1');
  sel.innerHTML = '<option value="">選択...</option>' + l1Tags.map(t => `<option value="${t.id}">${t.icon || ''} ${t.label_ja}</option>`).join('');
}

function setFilter(key, val, btn) {
  filters[key] = val;
  if (btn) {
    btn.parentElement.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyFilters();
}

function setTagFilter(l1Id) {
  filters.tagL1 = l1Id;
  filters.tagL2 = null;
  // Rebuild L1 buttons
  const l1Tags = allTags.filter(t => t.level === 1);
  let l1Html = `<button class="fbtn ${!l1Id ? 'active' : ''}" onclick="setTagFilter(null)">すべて</button>`;
  l1Tags.forEach(t => {
    l1Html += `<button class="fbtn ${l1Id === t.id ? 'active' : ''}" onclick="setTagFilter('${t.id}')">${t.icon || ''} ${t.label_ja || t.name}</button>`;
  });
  document.getElementById('tagL1Filters').innerHTML = l1Html;

  // Show L2
  const l2Row = document.getElementById('tagL2Filters');
  if (l1Id) {
    const l2Tags = allTags.filter(t => t.level === 2 && t.parent_id === l1Id);
    if (l2Tags.length) {
      l2Row.innerHTML = `<button class="fbtn active" onclick="setL2Filter(null, this)">すべて</button>` +
        l2Tags.map(t => `<button class="fbtn" onclick="setL2Filter('${t.id}', this)">${t.label_ja || t.name}</button>`).join('');
      l2Row.classList.add('show');
    } else {
      l2Row.classList.remove('show');
    }
  } else {
    l2Row.classList.remove('show');
  }
  applyFilters();
}

function setL2Filter(l2Id, btn) {
  filters.tagL2 = l2Id;
  if (btn) {
    btn.parentElement.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  applyFilters();
}

function getFiltered() {
  let list = allArticles;
  const q = document.getElementById('searchInput').value.toLowerCase();
  if (q) list = list.filter(a => ((a.title_ja || '') + (a.summary || '')).toLowerCase().includes(q));
  if (filters.status === 'unread') list = list.filter(a => !a.is_read);
  if (filters.status === 'clipped') list = list.filter(a => a.is_clipped);
  if (filters.status === 'deep') list = list.filter(a => deepResearchMap[a.id]);
  if (filters.category) list = list.filter(a => a.categories?.name === filters.category);

  if (filters.tagL1 || filters.tagL2) {
    const targetTagId = filters.tagL2 || filters.tagL1;
    // Get all descendant tag IDs
    const tagIds = new Set();
    function addDescendants(pid) {
      tagIds.add(pid);
      allTags.filter(t => t.parent_id === pid).forEach(t => addDescendants(t.id));
    }
    addDescendants(targetTagId);
    list = list.filter(a => {
      const aTags = articleTagsMap[a.id] || [];
      return aTags.some(tid => tagIds.has(tid));
    });
  }
  return list;
}

function applyFilters() {
  renderList(getFiltered());
}

// ===== Render List =====
function renderList(articles) {
  document.getElementById('count').textContent = articles.length + ' 件の記事';
  if (!articles.length) {
    document.getElementById('articleList').innerHTML = '<div class="loading">該当する記事がありません</div>';
    return;
  }

  const html = articles.map(a => {
    const cat = a.categories?.label_ja || '';
    const date = a.source_date || '';
    const summary = (a.summary || '').substring(0, 100);
    const readClass = a.is_read ? ' read' : '';
    const clipClass = a.is_clipped ? ' clipped' : '';
    const urlIcon = a.external_url ? getUrlIcon(a.external_url) : '📝';
    const srcBadge = a.source_type === 'manual_clip' || a.source_type === 'manual_note'
      ? `<span class="source-badge">${urlIcon} 手動</span>` : '';
    const deepBadge = deepResearchMap[a.id] ? `<span class="research-badge">🔬</span>` : '';

    // Tag badges
    const aTags = (articleTagsMap[a.id] || []).map(tid => allTags.find(t => t.id === tid)).filter(Boolean);
    let tagBadges = '';
    aTags.forEach(tag => {
      let l1 = tag;
      if (tag.level === 3) l1 = allTags.find(t => t.id === tag.parent_id);
      if (l1 && l1.level === 2) l1 = allTags.find(t => t.id === l1.parent_id);
      const color = (l1 && TAG_COLORS[l1.name]) || '#888';
      tagBadges += `<span class="tag-badge" style="background:${color}">${tag.label_ja || tag.name}</span>`;
    });

    const flagBtns = currentUser ? `
      <div class="flag-btns">
        <button class="flag-btn ${a.is_read ? 'on' : ''}" onclick="event.stopPropagation();toggleFlag('${a.id}','read')" title="既読">👁</button>
        <button class="flag-btn ${a.is_clipped ? 'on' : ''}" onclick="event.stopPropagation();toggleFlag('${a.id}','clipped')" title="クリップ">📌</button>
      </div>` : '';

    return `<div class="card${readClass}${clipClass}" onclick="showArticle('${a.slug}','${a.external_url || ''}','${a.id}')">
      ${flagBtns}
      <div class="meta"><div class="meta-left">${cat} | ${date} ${srcBadge}${deepBadge}</div></div>
      <div class="title">${a.title_ja || ''}</div>
      <div class="summary">${summary}...</div>
      ${tagBadges ? `<div class="tags-row">${tagBadges}</div>` : ''}
    </div>`;
  }).join('');

  document.getElementById('articleList').innerHTML = html;
}

// ===== Flag Toggle =====
async function toggleFlag(articleId, flag) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/toggle_article_flag", {
    method: 'POST',
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ p_article_id: articleId, p_flag: flag })
  });
  if (res.ok) {
    const result = await res.json();
    const article = allArticles.find(a => a.id === articleId);
    if (article) {
      if (flag === 'read') article.is_read = result.value;
      else article.is_clipped = result.value;
    }
    renderList(getFiltered());
  }
}

// ===== Show Article =====
async function showArticle(slug, extUrl, articleId) {
  currentArticleId = articleId || null;
  document.getElementById('listView').classList.add('hide');
  document.getElementById('articleView').classList.add('show');
  document.getElementById('articleContent').innerHTML = '<div class="loading">読み込み中...</div>';
  document.getElementById('researchResults').innerHTML = '';
  if (currentUser && articleId) {
    document.getElementById('deepResearchFab').classList.add('show');
  }

  const extLink = document.getElementById('extLink');
  if (extUrl && extUrl !== 'null' && extUrl !== '') {
    extLink.href = extUrl;
    extLink.style.display = 'block';
    const type = getUrlType(extUrl);
    if (type === 'googledoc') extLink.textContent = '📄 Googleドキュメントを開く';
    else if (type === 'pdf') extLink.textContent = '📕 PDFを開く';
    else extLink.textContent = '🔗 原文を開く';
  } else {
    extLink.style.display = 'none';
  }

  window.scrollTo(0, 0);
  const res = await fetch(SUPABASE_URL + "/rest/v1/articles?slug=eq." + encodeURIComponent(slug) + "&select=title_ja,body_html,source_date&status=eq.published", {
    headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY, "Accept-Profile": "research" }
  });
  const data = await res.json();
  if (data?.length) {
    document.getElementById('articleContent').innerHTML = data[0].body_html || '<p>コンテンツがありません</p>';
  } else {
    document.getElementById('articleContent').innerHTML = '<div class="loading">記事が見つかりません</div>';
  }
  if (articleId) loadArticleResearch(articleId);
}

function showList() {
  document.getElementById('listView').classList.remove('hide');
  document.getElementById('articleView').classList.remove('show');
  document.getElementById('deepResearchFab').classList.remove('show');
  window.scrollTo(0, 0);
}

// ===== Modal =====
let currentMode = 'url';

function openModal() {
  document.getElementById('modalOverlay').classList.add('show');
}
function closeModal(e) {
  if (e.target === document.getElementById('modalOverlay')) {
    document.getElementById('modalOverlay').classList.remove('show');
  }
}

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('tabUrl').classList.toggle('active', mode === 'url');
  document.getElementById('tabText').classList.toggle('active', mode === 'text');
  document.getElementById('fieldsUrl').classList.toggle('show', mode === 'url');
  document.getElementById('fieldsText').classList.toggle('show', mode === 'text');
}

function updateCharCount() {
  const len = document.getElementById('addBodyText').value.length;
  document.getElementById('charCount').textContent = len.toLocaleString() + '文字';
}

function updateTagL2Select() {
  const l1Id = document.getElementById('addTagL1').value;
  const sel = document.getElementById('addTagL2');
  if (!l1Id) { sel.innerHTML = '<option value="">選択...</option>'; return; }
  const l2Tags = allTags.filter(t => t.level === 2 && t.parent_id === l1Id);
  sel.innerHTML = '<option value="">選択...</option>' + l2Tags.map(t => `<option value="${t.id}">${t.label_ja || t.name}</option>`).join('');
}

async function submitArticle() {
  const tagL1 = document.getElementById('addTagL1').value || null;
  const tagL2 = document.getElementById('addTagL2').value || null;
  const tagIds = [tagL1, tagL2].filter(Boolean);

  const { data: { session } } = await sb.auth.getSession();
  if (!session) { alert('ログインが必要です'); return; }

  let payload;
  if (currentMode === 'url') {
    const title = document.getElementById('addTitle').value.trim();
    if (!title) { alert('タイトルは必須です'); return; }
    const url = document.getElementById('addUrl').value.trim() || null;
    const body = document.getElementById('addBody').value.trim() || null;
    payload = {
      p_title: title,
      p_url: url,
      p_body_text: body,
      p_tag_ids: tagIds,
      p_source_type: url ? 'manual_clip' : 'manual_note'
    };
  } else {
    const title = document.getElementById('addTitleText').value.trim();
    if (!title) { alert('タイトルは必須です'); return; }
    const bodyText = document.getElementById('addBodyText').value.trim();
    if (!bodyText) { alert('記事全文は必須です'); return; }
    const sourceUrl = document.getElementById('addSourceUrl').value.trim() || null;
    const summary = bodyText.substring(0, 200);
    payload = {
      p_title: title,
      p_url: sourceUrl,
      p_body_text: bodyText,
      p_summary: summary,
      p_tag_ids: tagIds,
      p_source_type: sourceUrl ? 'manual_clip' : 'manual_note'
    };
  }

  const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/add_manual_article", {
    method: 'POST',
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + session.access_token,
      "Content-Type": "application/json"
    },
    body: JSON.stringify(payload)
  });

  if (res.ok) {
    document.getElementById('modalOverlay').classList.remove('show');
    // フォームリセット
    document.getElementById('addTitle').value = '';
    document.getElementById('addUrl').value = '';
    document.getElementById('addBody').value = '';
    document.getElementById('addTitleText').value = '';
    document.getElementById('addBodyText').value = '';
    document.getElementById('addSourceUrl').value = '';
    document.getElementById('charCount').textContent = '0文字';
    document.getElementById('urlTypeBadge').style.display = 'none';
    document.getElementById('sourceUrlTypeBadge').style.display = 'none';
    switchMode('url');
    await loadData();
  } else {
    const err = await res.text();
    alert('登録エラー: ' + err);
  }
}

// ===== URL Type Utils =====
const URL_TYPE_INFO = {
  googledoc: { label: '📄 Googleドキュメント', color: '#3b82f6' },
  pdf:       { label: '📕 PDF',                color: '#ef4444' },
  web:       { label: '🔗 Webページ',           color: '#9ca3af' }
};

function getUrlType(url) {
  if (!url) return null;
  if (url.includes('docs.google.com/document')) return 'googledoc';
  if (url.endsWith('.pdf') || url.includes('drive.google.com')) return 'pdf';
  return 'web';
}

function getUrlIcon(url) {
  const type = getUrlType(url);
  if (type === 'googledoc') return '📄';
  if (type === 'pdf') return '📕';
  if (type === 'web') return '🔗';
  return '📝';
}

function updateUrlBadge(inputId, badgeId) {
  const url = document.getElementById(inputId).value.trim();
  const badge = document.getElementById(badgeId);
  const type = getUrlType(url);
  if (type && URL_TYPE_INFO[type]) {
    const info = URL_TYPE_INFO[type];
    badge.textContent = info.label;
    badge.style.background = info.color;
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}

// ===== Deep Research =====
function openDeepResearchModal() {
  document.getElementById('deepResearchModalOverlay').classList.add('show');
}

function closeDeepResearchModal(e) {
  if (e.target === document.getElementById('deepResearchModalOverlay')) {
    document.getElementById('deepResearchModalOverlay').classList.remove('show');
  }
}

async function submitDeepResearch() {
  const focusPoint = document.getElementById('drFocusPoint').value.trim();
  if (!focusPoint) { alert('深掘りポイントは必須です'); return; }
  const additionalContext = document.getElementById('drAdditionalContext').value.trim() || null;
  const priority = parseInt(document.getElementById('drPriority').value);

  const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/create_deep_research_request", {
    method: 'POST',
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      p_article_id: currentArticleId,
      p_focus_point: focusPoint,
      p_additional_context: additionalContext,
      p_priority: priority
    })
  });

  if (res.ok) {
    document.getElementById('deepResearchModalOverlay').classList.remove('show');
    document.getElementById('drFocusPoint').value = '';
    document.getElementById('drAdditionalContext').value = '';
    document.getElementById('drPriority').value = '5';
    deepResearchMap[currentArticleId] = true;
    showToast('深掘りリクエストを登録しました');
    loadArticleResearch(currentArticleId);
  } else {
    const err = await res.text();
    alert('送信エラー: ' + err);
  }
}

async function loadArticleResearch(articleId) {
  const section = document.getElementById('researchResults');
  const res = await fetch(SUPABASE_URL + "/rest/v1/rpc/get_article_research", {
    method: 'POST',
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ p_article_id: articleId })
  });
  if (!res.ok) { section.innerHTML = ''; return; }
  const data = await res.json();
  if (!Array.isArray(data) || !data.length) { section.innerHTML = ''; return; }
  renderResearchResults(data, section);
}

function renderResearchResults(data, section) {
  const statusLabels = { pending: '待機中', processing: '処理中', completed: '完了', failed: 'エラー' };
  const notebookLabels = {
    not_started: '未開始',
    doc_ready: '📄 Doc準備済',
    audio_ready: '🎧 音声生成済',
    slides_ready: '📊 スライド生成済'
  };

  const cardsHtml = data.map(r => {
    const statusLabel = statusLabels[r.status] || r.status;
    const date = r.completed_at
      ? '完了: ' + new Date(r.completed_at).toLocaleDateString('ja-JP')
      : '登録: ' + new Date(r.created_at).toLocaleDateString('ja-JP');
    return `
      <div class="research-card">
        <span class="research-status-badge ${r.status}">${statusLabel}</span>
        <div class="research-focus">${r.focus_point || ''}</div>
        ${r.status === 'completed' && r.result_summary ? `<div class="research-summary">${r.result_summary}</div>` : ''}
        ${r.result_doc_url ? `<a class="research-link" href="${r.result_doc_url}" target="_blank">📄 Googleドキュメントを開く</a>` : ''}
        ${r.notebook_lm_status ? `<div><span class="research-notebook-badge">🎧 NotebookLM: ${notebookLabels[r.notebook_lm_status] || r.notebook_lm_status}</span></div>` : ''}
        <div class="research-date">${date}</div>
      </div>`;
  }).join('');

  section.innerHTML = `<div class="research-section"><h3>🔬 深掘りリサーチ結果</h3>${cardsHtml}</div>`;
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3000);
}

// ===== Init =====
initAuth();
loadData();
