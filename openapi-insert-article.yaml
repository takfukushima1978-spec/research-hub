openapi: 3.1.0
info:
  title: Research Hub - Insert Article API
  description: AI Research Hubに記事を投入するAPI。ChatGPT GPTsから呼び出して使用する。
  version: "2.0"
servers:
  - url: https://swgdzytwyvkwvncaqjks.supabase.co/functions/v1
paths:
  /insert-article:
    post:
      operationId: insertArticle
      summary: リサーチ記事をResearch Hubに投入する
      description: |
        リサーチ結果を記事としてSupabase DBに投入し、Webビューワーに自動表示する。
        slug・body_textは省略可能（自動生成される）。
        未知のcategory_nameは自動作成される。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - category_name
                - body_html
                - summary
                - source_date
              properties:
                title:
                  type: string
                  description: 記事タイトル（日本語）
                  example: "Claude Code 4月アップデート総まとめ"
                category_name:
                  type: string
                  description: カテゴリ識別子。既存: claude_code, ai_accounting, claude_code_official。未知の値は自動作成される。
                  example: "claude_code"
                body_html:
                  type: string
                  description: 記事本文（HTML形式）。見出し・リスト・リンク等を含むリッチなHTML。
                  example: "<h2>概要</h2><p>2026年4月のアップデート内容です。</p>"
                summary:
                  type: string
                  description: 記事の要約（1-3文）。一覧表示に使用される。
                  example: "Claude Codeの2026年4月アップデートをまとめました。"
                source_date:
                  type: string
                  format: date
                  description: 記事の日付（YYYY-MM-DD形式）
                  example: "2026-04-16"
                slug:
                  type: string
                  description: URL用スラッグ（省略時は自動生成）
                  example: "claude-code-april-updates-2026"
                body_text:
                  type: string
                  description: プレーンテキスト版本文（省略時はbody_htmlから自動生成）
                tag_names:
                  type: array
                  items:
                    type: string
                  description: タグ名の配列（省略可）
                  example: ["claude_code", "update"]
                source_urls:
                  type: array
                  items:
                    type: object
                    required:
                      - url
                    properties:
                      url:
                        type: string
                        description: ソース記事のURL
                      title:
                        type: string
                        description: ソース記事のタイトル
                      domain:
                        type: string
                        description: ソースのドメイン名
                  description: 参照元URL一覧（省略可）
      responses:
        "201":
          description: 記事投入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: 投入された記事のID
                  slug:
                    type: string
                    description: 記事のスラッグ（自動生成された場合はその値）
        "400":
          description: バリデーションエラーまたはRPCエラー
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "401":
          description: 認証エラー（X-Internal-Tokenが不正）
        "429":
          description: レートリミット超過（1分間10リクエストまで）
